
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
.section{background:#0a0a0a;padding:64px 0;font-family:'Inter',sans-serif;overflow:hidden}
.section-header{padding:0 48px;margin-bottom:40px;display:flex;align-items:center;gap:16px}
.section-label{font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#333}
.header-line{flex:1;height:1px;background:#1a1a1a}

.marquee-wrapper{position:relative;overflow:hidden}
.marquee-wrapper::before,.marquee-wrapper::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2}
.marquee-wrapper::before{left:0;background:linear-gradient(to right,#0a0a0a,transparent)}
.marquee-wrapper::after{right:0;background:linear-gradient(to left,#0a0a0a,transparent)}

.marquee-track{display:flex;gap:0;width:max-content;animation:scroll 28s linear infinite}
.marquee-track:hover{animation-play-state:paused}

@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

.tech-item{display:flex;align-items:center;gap:10px;padding:12px 28px;border-right:1px solid #161616;white-space:nowrap;cursor:default}
.tech-item:hover .tech-name{color:#c0c0c0}
.tech-icon{width:18px;height:18px;display:flex;align-items:center;justify-content:center;opacity:0.35;flex-shrink:0}
.tech-icon svg{width:18px;height:18px;fill:#f0f0f0}
.tech-name{font-size:12px;letter-spacing:0.08em;color:#383838;text-transform:uppercase;transition:color 0.2s}

.marquee-track-2{display:flex;gap:0;width:max-content;animation:scroll2 34s linear infinite;margin-top:1px}
.marquee-track-2:hover{animation-play-state:paused}
@keyframes scroll2{0%{transform:translateX(-50%)}100%{transform:translateX(0)}}
</style>

<div class="section">
  <div class="section-header">
    <span class="section-label">Stack</span>
    <div class="header-line"></div>
  </div>

  <div class="marquee-wrapper">
    <div class="marquee-track" id="t1"></div>
  </div>

  <div style="height:1px;background:#111;margin-top:0"></div>

  <div class="marquee-wrapper" style="margin-top:1px">
    <div class="marquee-track-2" id="t2"></div>
  </div>
</div>
